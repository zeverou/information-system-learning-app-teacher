# https://github.com/actions/deploy-pages#usage
name: Deploy to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pick your own package manager and build script
      - run: npm install
      - name: Use repository variables when configured
        env:
          REPOSITORY_NUXT_PUBLIC_APP_MODE: ${{ vars.NUXT_PUBLIC_APP_MODE }}
          REPOSITORY_NUXT_PUBLIC_LOAD_COMPONENTS_FROM: ${{ vars.NUXT_PUBLIC_LOAD_COMPONENTS_FROM }}
          REPOSITORY_NUXT_PUBLIC_LOAD_PAGES_FROM: ${{ vars.NUXT_PUBLIC_LOAD_PAGES_FROM }}
          REPOSITORY_NUXT_PUBLIC_HTML_AVAILABLE: ${{ vars.NUXT_PUBLIC_HTML_AVAILABLE }}
          REPOSITORY_NUXT_PUBLIC_CSS_AVAILABLE: ${{ vars.NUXT_PUBLIC_CSS_AVAILABLE }}
          REPOSITORY_NUXT_PUBLIC_JS_AVAILABLE: ${{ vars.NUXT_PUBLIC_JS_AVAILABLE }}
          REPOSITORY_NUXT_PUBLIC_SQL_AVAILABLE: ${{ vars.NUXT_PUBLIC_SQL_AVAILABLE }}
          REPOSITORY_NUXT_PUBLIC_JS_CLICK_AVAILABLE: ${{ vars.NUXT_PUBLIC_JS_CLICK_AVAILABLE }}
          REPOSITORY_NUXT_PUBLIC_SQL_CLICK_AVAILABLE: ${{ vars.NUXT_PUBLIC_SQL_CLICK_AVAILABLE }}
          REPOSITORY_NUXT_PUBLIC_SINGLE_SYSTEM: ${{ vars.NUXT_PUBLIC_SINGLE_SYSTEM }}
          REPOSITORY_NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL }}
        run: |
          set_repository_variable() {
            local name="$1"
            local value="$2"

            if [ -n "$value" ]; then
              echo "$name=$value" >> "$GITHUB_ENV"
            fi
          }

          set_repository_variable "NUXT_PUBLIC_APP_MODE" "$REPOSITORY_NUXT_PUBLIC_APP_MODE"
          set_repository_variable "NUXT_PUBLIC_LOAD_COMPONENTS_FROM" "$REPOSITORY_NUXT_PUBLIC_LOAD_COMPONENTS_FROM"
          set_repository_variable "NUXT_PUBLIC_LOAD_PAGES_FROM" "$REPOSITORY_NUXT_PUBLIC_LOAD_PAGES_FROM"
          set_repository_variable "NUXT_PUBLIC_HTML_AVAILABLE" "$REPOSITORY_NUXT_PUBLIC_HTML_AVAILABLE"
          set_repository_variable "NUXT_PUBLIC_CSS_AVAILABLE" "$REPOSITORY_NUXT_PUBLIC_CSS_AVAILABLE"
          set_repository_variable "NUXT_PUBLIC_JS_AVAILABLE" "$REPOSITORY_NUXT_PUBLIC_JS_AVAILABLE"
          set_repository_variable "NUXT_PUBLIC_SQL_AVAILABLE" "$REPOSITORY_NUXT_PUBLIC_SQL_AVAILABLE"
          set_repository_variable "NUXT_PUBLIC_JS_CLICK_AVAILABLE" "$REPOSITORY_NUXT_PUBLIC_JS_CLICK_AVAILABLE"
          set_repository_variable "NUXT_PUBLIC_SQL_CLICK_AVAILABLE" "$REPOSITORY_NUXT_PUBLIC_SQL_CLICK_AVAILABLE"
          set_repository_variable "NUXT_PUBLIC_SINGLE_SYSTEM" "$REPOSITORY_NUXT_PUBLIC_SINGLE_SYSTEM"
          set_repository_variable "NUXT_APP_BASE_URL" "$REPOSITORY_NUXT_APP_BASE_URL"
      - run: npx nuxt build --preset github_pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public
  # Deployment job
  deploy:
    # Add a dependency to the build job
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    # Deploy to the github_pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
